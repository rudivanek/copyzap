    <style>
      /* Ensure the body and html take full height */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      /* Initial loading state */
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #ffffff;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
      }

      .dark .initial-loader {
        background-color: #000000;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 107, 53, 0.2);
        border-radius: 50%;
        position: relative;
        animation: spin 0.8s linear infinite;
      }

      .spinner::before {
        content: '';
        position: absolute;
        top: -4px;
        left: -4px;
        right: -4px;
        bottom: -4px;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top-color: #ff6b35;
        animation: spin 0.8s linear infinite;
      }

      .spinner::after {
        content: '';
        position: absolute;
        top: -4px;
        left: -4px;
        right: -4px;
        bottom: -4px;
        border-radius: 50%;
        border: 4px solid transparent;
        border-bottom-color: #ffa07a;
        animation: spin 0.8s linear infinite reverse;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .initial-loader-text {
        margin-top: 16px;
        font-family: 'Geist', sans-serif;
        color: #374151;
      }

      .dark .initial-loader-text {
        color: #d1d5db;
      }
    </style>
  </head>
